server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name hotel-voice-agent.example.com;

    # ── TLS ──────────────────────────────────────────────────────────────────
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── Security Headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" always;
    add_header X-Request-ID $request_id always;

    # ── Connection limits ─────────────────────────────────────────────────────
    limit_conn conn_limit 20;

    # ── Static files ──────────────────────────────────────────────────────────
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "private";
    }

    # ── Auth endpoints (strict rate limit) ───────────────────────────────────
    location ~ ^/api/v1/auth/(token|register)/ {
        limit_req zone=auth burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://django_http;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Voice API (voice rate limit) ─────────────────────────────────────────
    location /api/v1/voice/ {
        limit_req zone=voice burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://django_http;
        proxy_read_timeout 120s;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── WebSocket ─────────────────────────────────────────────────────────────
    location /ws/ {
        limit_req zone=voice burst=3 nodelay;
        proxy_pass http://django_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Health check (no rate limit) ─────────────────────────────────────────
    location /api/v1/health/ {
        proxy_pass http://django_http;
        access_log off;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Prometheus metrics (internal only) ───────────────────────────────────
    location /metrics/ {
        allow 172.20.0.0/16;  # Docker network only
        deny all;
        proxy_pass http://django_http;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── General API ──────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://django_http;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Admin (IP restricted) ─────────────────────────────────────────────────
    location /admin/ {
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        deny all;
        proxy_pass http://django_http;
        include /etc/nginx/conf.d/proxy_params.conf;
    }
}
