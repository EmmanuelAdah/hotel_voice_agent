user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────────
    log_format json_combined escape=json
        '{"time": "$time_iso8601",'
        '"remote_addr": "$remote_addr",'
        '"method": "$request_method",'
        '"uri": "$request_uri",'
        '"status": $status,'
        '"bytes_sent": $bytes_sent,'
        '"request_time": $request_time,'
        '"upstream_time": "$upstream_response_time",'
        '"http_referer": "$http_referer",'
        '"http_user_agent": "$http_user_agent",'
        '"request_id": "$request_id"}';

    access_log /var/log/nginx/access.log json_combined;

    # ── Performance ────────────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 10M;
    client_body_buffer_size 128k;

    # ── Compression ────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ── Rate Limiting Zones ────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=voice:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=global:10m rate=200r/m;

    # ── Connection Limiting ────────────────────────────────────────────────────
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Upstream: Django HTTP (load balanced) ─────────────────────────────────
    upstream django_http {
        least_conn;
        server web:8000 max_fails=3 fail_timeout=30s weight=1;
        keepalive 32;
    }

    # ── Upstream: Django WebSocket (load balanced) ────────────────────────────
    upstream django_ws {
        ip_hash;  # Sticky sessions for WebSocket
        server daphne:8001 max_fails=3 fail_timeout=30s;
        keepalive 64;
    }

    # ── Request ID ────────────────────────────────────────────────────────────
    map $http_x_request_id $request_id {
        default $http_x_request_id;
        ""      $request_id;
    }

    include /etc/nginx/conf.d/*.conf;
}
