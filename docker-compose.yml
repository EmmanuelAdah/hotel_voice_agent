version: "3.9"

x-django-common: &django-common
  build:
    context: .
    dockerfile: docker/Dockerfile
  env_file: .env.example
  volumes:
    - static_volume:/app/staticfiles
    - media_volume:/app/media
    - logs_volume:/var/log/hotel-agent
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    kafka:
      condition: service_healthy
  networks:
    - hotel_net
  restart: unless-stopped

services:
  # ── Application ──────────────────────────────────────────────────────────────
  web:
    <<: *django-common
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn hotel_agent.wsgi:application
               --bind 0.0.0.0:8000
               --workers 4
               --worker-class sync
               --worker-connections 1000
               --timeout 120
               --keep-alive 5
               --access-logfile -
               --error-logfile -
               --log-level info"
    expose:
      - "8000"
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "2"
          memory: 1G
      restart_policy:
        condition: on-failure
        max_attempts: 3

  daphne:
    <<: *django-common
    command: daphne -b 0.0.0.0 -p 8001 hotel_agent.asgi:application
    expose:
      - "8001"
    deploy:
      replicas: 2

  celery_worker:
    <<: *django-common
    command: >
      celery -A hotel_agent worker
        --loglevel=info
        --concurrency=4
        --queues=default,notifications,voice
        --max-tasks-per-child=1000
        --prefetch-multiplier=1
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1"
          memory: 512M

  celery_beat:
    <<: *django-common
    command: celery -A hotel_agent beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    deploy:
      replicas: 1

  kafka_consumer:
    <<: *django-common
    command: python manage.py run_kafka_consumer
    deploy:
      replicas: 2

  # ── Infrastructure ───────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine

    ports:
      - "80:80"
      - "443:443"

    env_file:
      - .env

    volumes:
      - ./config/nginx/nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - ./config/nginx/conf.d:/etc/nginx/conf.d:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
      - certs_volume:/etc/nginx/certs:ro

    depends_on:
      web:
        condition: service_healthy
      daphne:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 5

    networks:
      - hotel_net

    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-hotel_agent}
      POSTGRES_USER: ${DB_USER:-hotel_agent}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hotel_agent} -d ${DB_NAME:-hotel_agent}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c maintenance_work_mem=64MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c default_statistics_target=100
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c work_mem=4MB
        -c huge_pages=off
        -c min_wal_size=1GB
        -c max_wal_size=4GB
    networks:
      - hotel_net
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    command: >
      redis-server
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --save 900 1
        --save 300 10
        --save 60 10000
        --appendonly yes
        --appendfsync everysec
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hotel_net
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka
    container_name: kafka

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2QkE2QzQ2Rk
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_MESSAGE_MAX_BYTES: 10485760

    volumes:
      - kafka_data:/var/lib/kafka/data

    ports:
      - "9092:9092"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"
        ]
      interval: 30s
      timeout: 10s
      retries: 5

    networks:
      - hotel_net

    restart: unless-stopped

  # ── Monitoring ────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - hotel_net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-changeme}
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-piechart-panel
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - hotel_net
    restart: unless-stopped

  # Kafka metrics exporter
  kafka_exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    command: --kafka.server=kafka:9092
    ports:
      - "9308:9308"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - hotel_net
    restart: unless-stopped

  # PostgreSQL metrics exporter
  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hotel_net
    restart: unless-stopped

  # Redis metrics exporter
  redis_exporter:
    image: oliver006/redis_exporter:v1.61.0
    environment:
      REDIS_ADDR: redis://redis:6379
    ports:
      - "9121:9121"
    depends_on:
      - redis
    networks:
      - hotel_net
    restart: unless-stopped

networks:
  hotel_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  prometheus_data:
  grafana_data:
  static_volume:
  media_volume:
  logs_volume:
  certs_volume:
